<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playfair Cipher</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* General styling */
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #ff7e5f, #feb47b);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        h1 {
            font-size: 2.5rem;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
        }

        /* Container for input area */
        .container {
            background: rgba(0, 0, 0, 0.7);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 600px;
            text-align: center;
        }

        textarea {
            width: 100%;
            height: 150px;
            padding: 15px;
            border-radius: 10px;
            border: none;
            font-size: 1.1rem;
            color: #264653;
            background-color: #f1faee;
            margin-bottom: 20px;
            resize: none;
        }

        button {
            padding: 10px 20px;
            background-color: #e9c46a;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1rem;
            color: #264653;
            transition: background-color 0.3s, transform 0.3s;
        }

        button:hover {
            background-color: #f4a261;
            transform: scale(1.05);
        }

        .result {
            margin-top: 20px;
            font-size: 1.3rem;
            background: #264653;
            padding: 15px;
            border-radius: 10px;
            color: #f1faee;
            min-height: 50px;
            word-wrap: break-word;
        }

        .key-input {
            margin-bottom: 20px;
            padding: 10px;
            font-size: 1rem;
            border-radius: 5px;
            width: 100%;
        }
    </style>
</head>
<body>
  <h1>Playfair Cipher</h1>
  <div class="container">
    <textarea id="inputText" placeholder="Enter text to encrypt or decrypt..."></textarea>
    <input id="keyInput" class="key-input" placeholder="Enter Key (Auto Generated if empty)" />
    <div class="controls">
      <button onclick="handleEncrypt()">Encrypt</button>
      <button onclick="handleDecrypt()">Decrypt</button>
      <div class="strip">
        <input type="checkbox" id="stripX" checked />
        <label for="stripX">Remove Strip filler 'X' after decrypt</label>
      </div>
    </div>
    <div class="result" id="resultRaw" aria-live="polite"></div>
    <div class="cleaned" id="resultCleaned" aria-live="polite"></div>
    <div class="time" id="timeTaken"></div>
  </div>

  <script>
    const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";

    function handleEncrypt(){ processText(true); }
    function handleDecrypt(){ processText(false); }

    function processText(isEncrypt){
      const key = document.getElementById("keyInput").value || generateKey();
      const matrix = createPlayfairMatrix(key);
      let rawInput = document.getElementById("inputText").value
        .toUpperCase().replace(/[^A-Z0-9]/g, "");
      const digraphs = createDigraphs(rawInput, isEncrypt);
      const t0 = performance.now();
      const output = digraphs.map(pair => isEncrypt ? playfairTransform(pair, matrix, true) : playfairTransform(pair, matrix, false)).join("");
      const t1 = performance.now();
      if (isEncrypt) {
        document.getElementById("resultRaw").innerText = "Ciphertext: " + output;
        document.getElementById("resultCleaned").innerText = "";
      } else {
        document.getElementById("resultRaw").innerText = "Decrypted (raw): " + output;
        const cleaned = (document.getElementById("stripX").checked) ? cleanDecrypted(output) : output;
        document.getElementById("resultCleaned").innerText = "Final: " + cleaned;
      }
      document.getElementById("timeTaken").innerText = `⏱ Time Taken: ${(t1 - t0).toFixed(3)} ms`;
    }

    function generateKey(){
      let inputText = document.getElementById("inputText").value
        .toUpperCase().replace(/[^A-Z0-9]/g, "");
      let key = "";
      let used = new Set();
      for (let ch of inputText){
        if (!used.has(ch)){ used.add(ch); key += ch; }
      }
      for (let ch of alphabet){
        if (!used.has(ch)){ used.add(ch); key += ch; }
      }
      document.getElementById("keyInput").value = key;
      return key;
    }

    function createPlayfairMatrix(key){
      let matrix = [];
      let used = new Set();
      key = key.toUpperCase().replace(/[^A-Z0-9]/g, "");
      for (let ch of key) if (!used.has(ch)){ used.add(ch); matrix.push(ch); }
      for (let ch of alphabet) if (!used.has(ch)){ used.add(ch); matrix.push(ch); }
      return matrix;
    }

    function createDigraphs(text, isEncrypt){
      let digraphs = [];
      let i = 0;
      while (i < text.length) {
        let first = text[i];
        let second = (i + 1 < text.length) ? text[i+1] : "X";
        if (first === second) {
          digraphs.push(first + "X");
          i += 1;
        } else {
          digraphs.push(first + second);
          i += 2;
        }
      }
      if (isEncrypt && digraphs[digraphs.length - 1].length === 1) {
        digraphs[digraphs.length - 1] += "X";
      }
      return digraphs;
    }

    function playfairTransform(pair, matrix, encrypt = true){
      const size = 6;
      let i1 = matrix.indexOf(pair[0]), i2 = matrix.indexOf(pair[1]);
      let r1 = Math.floor(i1 / size), c1 = i1 % size;
      let r2 = Math.floor(i2 / size), c2 = i2 % size;
      if (r1 === r2) {
        return matrix[r1*size + ((c1 + (encrypt ? 1 : size - 1)) % size)]
             + matrix[r2*size + ((c2 + (encrypt ? 1 : size - 1)) % size)];
      } else if (c1 === c2) {
        return matrix[((r1 + (encrypt ? 1 : size - 1)) % size) * size + c1]
             + matrix[((r2 + (encrypt ? 1 : size - 1)) % size) * size + c2];
      } else {
        return matrix[r1*size + c2] + matrix[r2*size + c1];
      }
    }

    function cleanDecrypted(text){
      let res = "";
      let i = 0;
      while (i < text.length) {
        if (i + 2 < text.length && text[i+1] === "X" && text[i] === text[i+2]) {
          res += text[i] + text[i+2];
          i += 3;
        } else {
          res += text[i];
          i += 1;
        }
      }
      if (res.endsWith("X")) res = res.slice(0, -1);
      return res;
    }
  </script>
</body>
</html>
