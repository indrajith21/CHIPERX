<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hill Cipher Encryption</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f2f2f2;
            color: #333;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        h1 {
            text-align: center;
            color: #4CAF50;
        }

        .container {
            width: 80%;
            max-width: 800px;
            background-color: #ffffff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .input-section,
        .output-section {
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 100px;
            padding: 10px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 5px;
            margin-bottom: 15px;
        }

        .matrix-input {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 20px;
        }

        .matrix-input input {
            padding: 10px;
            font-size: 16px;
            text-align: center;
            border: 2px solid #ddd;
            border-radius: 5px;
        }

        .button-container {
            text-align: center;
            margin-top: 20px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            margin: 5px;
        }

        button:hover {
            background-color: #45a049;
        }

        .result-section {
            padding: 10px;
            background-color: #e8f5e9;
            border-radius: 5px;
            margin-top: 20px;
            font-size: 18px;
        }

        .result {
            font-weight: bold;
        }

        .clear-button {
            background-color: #f44336;
        }

        .clear-button:hover {
            background-color: #e53935;
        }
    </style>
</head>
<body>
  <div class="container">
    <h1>Hill Cipher </h1>
    <label for="inputText">Enter Text:</label>
    <textarea id="inputText" placeholder="Enter text..."></textarea>

    <label>Enter Key Matrix (3x3):</label>
    <div class="matrix-input">
      <input type="number" id="key11" placeholder="a11">
      <input type="number" id="key12" placeholder="a12">
      <input type="number" id="key13" placeholder="a13">
      <input type="number" id="key21" placeholder="a21">
      <input type="number" id="key22" placeholder="a22">
      <input type="number" id="key23" placeholder="a23">
      <input type="number" id="key31" placeholder="a31">
      <input type="number" id="key32" placeholder="a32">
      <input type="number" id="key33" placeholder="a33">
    </div>

    <div class="button-container">
      <button onclick="encryptText()">Encrypt</button>
      <button onclick="decryptText()">Decrypt</button>
      <button class="clear-button" onclick="clearFields()">Clear</button>
    </div>

    <div class="result-section">
      <div id="result"></div>
      <div id="timeTaken" class="time"></div>
    </div>
  </div>

  <script>
    const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
    const m = alphabet.length; // 36

    // Default invertible key matrix mod 36
    const defaultKeyMatrix = [
      [1, 2, 3],
      [0, 1, 4],
      [5, 6, 0]
    ];

    function getKeyMatrix() {
      return [
        [
          parseInt(document.getElementById("key11").value) || defaultKeyMatrix[0][0],
          parseInt(document.getElementById("key12").value) || defaultKeyMatrix[0][1],
          parseInt(document.getElementById("key13").value) || defaultKeyMatrix[0][2]
        ],
        [
          parseInt(document.getElementById("key21").value) || defaultKeyMatrix[1][0],
          parseInt(document.getElementById("key22").value) || defaultKeyMatrix[1][1],
          parseInt(document.getElementById("key23").value) || defaultKeyMatrix[1][2]
        ],
        [
          parseInt(document.getElementById("key31").value) || defaultKeyMatrix[2][0],
          parseInt(document.getElementById("key32").value) || defaultKeyMatrix[2][1],
          parseInt(document.getElementById("key33").value) || defaultKeyMatrix[2][2]
        ]
      ];
    }

    function multiplyMatrix(matrix, vector) {
      let result = [];
      for (let i = 0; i < matrix.length; i++) {
        result[i] = matrix[i].reduce((sum, val, index) => sum + val * vector[index], 0) % m;
      }
      return result;
    }

    function modInverse(a, m) {
      a = (a % m + m) % m;
      for (let x = 1; x < m; x++) {
        if ((a * x) % m === 1) return x;
      }
      return null;
    }

    function matrixInverse(matrix) {
      let det = (
        matrix[0][0]*(matrix[1][1]*matrix[2][2] - matrix[1][2]*matrix[2][1]) -
        matrix[0][1]*(matrix[1][0]*matrix[2][2] - matrix[1][2]*matrix[2][0]) +
        matrix[0][2]*(matrix[1][0]*matrix[2][1] - matrix[1][1]*matrix[2][0])
      ) % m;
      det = (det + m) % m;
      const detInv = modInverse(det, m);
      if (!detInv) { alert("Key matrix not invertible mod 36."); return null; }

      let adj = [
        [
          (matrix[1][1]*matrix[2][2] - matrix[1][2]*matrix[2][1]) % m,
          (-(matrix[0][1]*matrix[2][2] - matrix[0][2]*matrix[2][1])) % m,
          (matrix[0][1]*matrix[1][2] - matrix[0][2]*matrix[1][1]) % m
        ],
        [
          (-(matrix[1][0]*matrix[2][2] - matrix[1][2]*matrix[2][0])) % m,
          (matrix[0][0]*matrix[2][2] - matrix[0][2]*matrix[2][0]) % m,
          (-(matrix[0][0]*matrix[1][2] - matrix[1][0]*matrix[0][2])) % m
        ],
        [
          (matrix[1][0]*matrix[2][1] - matrix[1][1]*matrix[2][0]) % m,
          (-(matrix[0][0]*matrix[2][1] - matrix[2][0]*matrix[0][1])) % m,
          (matrix[0][0]*matrix[1][1] - matrix[0][1]*matrix[1][0]) % m
        ]
      ];

      for (let i = 0; i < 3; i++) {
        for (let j = 0; j < 3; j++) {
          adj[i][j] = (adj[i][j] * detInv) % m;
          if (adj[i][j] < 0) adj[i][j] += m;
        }
      }
      return adj;
    }

    function textToNumbers(text) {
      return text.split("").map(c => alphabet.indexOf(c));
    }

    function numbersToText(nums) {
      return nums.map(n => alphabet[n % m]).join("");
    }

    function encryptText() {
      let inputText = document.getElementById("inputText").value.toUpperCase().replace(/[^A-Z0-9]/g, "");
      if (!inputText) { alert("Please enter text."); return; }
      while (inputText.length % 3 !== 0) inputText += "X";

      const keyMatrix = getKeyMatrix();
      const t0 = performance.now();
      let resultText = "";
      for (let i = 0; i < inputText.length; i += 3) {
        let block = textToNumbers(inputText.slice(i, i + 3));
        let encrypted = multiplyMatrix(keyMatrix, block);
        resultText += numbersToText(encrypted);
      }
      const t1 = performance.now();

      document.getElementById("result").innerText = "Encrypted: " + resultText;
      document.getElementById("timeTaken").innerText = `⏱ Time Taken: ${(t1 - t0).toFixed(3)} ms`;
    }

    function decryptText() {
      let inputText = document.getElementById("inputText").value.toUpperCase().replace(/[^A-Z0-9]/g, "");
      if (!inputText) { alert("Please enter text."); return; }
      while (inputText.length % 3 !== 0) inputText += "X";

      const keyMatrix = getKeyMatrix();
      const inverseMatrix = matrixInverse(keyMatrix);
      if (!inverseMatrix) return;

      const t0 = performance.now();
      let resultText = "";
      for (let i = 0; i < inputText.length; i += 3) {
        let block = textToNumbers(inputText.slice(i, i + 3));
        let decrypted = multiplyMatrix(inverseMatrix, block);
        resultText += numbersToText(decrypted);
      }
      const t1 = performance.now();

      document.getElementById("result").innerText = "Decrypted: " + resultText;
      document.getElementById("timeTaken").innerText = `⏱ Time Taken: ${(t1 - t0).toFixed(3)} ms`;
    }

    function clearFields() {
      document.getElementById("inputText").value = "";
      document.getElementById("result").innerText = "";
      document.getElementById("timeTaken").innerText = "";
      document.querySelectorAll(".matrix-input input").forEach(input => input.value = "");
    }
  </script>
</body>
</html>
