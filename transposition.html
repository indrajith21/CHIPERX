<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transposition Techniques</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #3a0ca3, #7209b7);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 30px;
            text-shadow: 1px 1px 5px rgba(0, 0, 0, 0.2);
            color: #f1faee;
        }
        .container {
            display: flex;
            gap: 40px;
            width: 80%;
            max-width: 1300px;
        }
        .input-box {
            background: #a29bfe;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease;
            width: 45%;
        }
        .input-box:hover {
            transform: translateY(-5px);
        }
        .input-box h2 {
            font-size: 1.8rem;
            margin-bottom: 15px;
            color: #fff;
        }
        .input-box p {
            font-size: 1rem;
            color: #f1faee;
            margin-bottom: 20px;
        }
        .input-box input,
        .input-box select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            font-size: 1.1rem;
            border-radius: 8px;
            border: none;
            outline: none;
            background: #fff;
            color: #333;
        }
        .input-box button {
            padding: 12px 20px;
            font-size: 1.1rem;
            background-color: #7209b7;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .input-box button:hover {
            background-color: #a29bfe;
        }
        .result-box {
            background: #2d3436;
            padding: 20px;
            border-radius: 8px;
            color: #fff;
            font-size: 1.2rem;
            margin-top: 20px;
            text-align: left;
            display: none;
        }
        footer {
            position: absolute;
            bottom: 20px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.7);
        }
    </style>
</head>
<body>
    <h1>Transposition Techniques</h1>
    <div class="container">
        <!-- Single Transposition -->
        <div class="input-box">
            <h2>Single Transposition</h2>
            <input type="text" id="inputMessage" placeholder="Enter message (A–Z, 0–9)" />
            <input type="text" id="singleKey" placeholder="Enter key (e.g., 3,1,2)" value="3,1,2" />
            <div class="btn-group">
                <button onclick="performSingleTransposition()">Encrypt</button>
                <button onclick="performSingleDecryption()">Decrypt</button>
            </div>
            <div id="singleResult" class="result-box"></div>
            <div id="singleTime" class="time"></div>
        </div>

        <!-- Double Transposition -->
        <div class="input-box">
            <h2>Double Transposition</h2>
            <input type="text" id="inputMessageDouble" placeholder="Enter message (A–Z, 0–9)" />
            <input type="text" id="doubleKey1" placeholder="First key (e.g., 4,2,3,1)" value="4,2,3,1" />
            <input type="text" id="doubleKey2" placeholder="Second key (e.g., 2,4,1,3)" value="2,4,1,3" />
            <div class="btn-group">
                <button onclick="performDoubleTransposition()">Encrypt</button>
                <button onclick="performDoubleDecryption()">Decrypt</button>
            </div>
            <div id="doubleResult" class="result-box"></div>
            <div id="doubleTime" class="time"></div>
        </div>
    </div>

 

    <script>
        // ---------- Single Transposition Encryption ----------
        function singleTransposition(message, key) {
            let result = '';
            key = key.split(',').map(Number);
            let rows = Math.ceil(message.length / key.length);
            let paddedMessage = message.padEnd(rows * key.length, 'X');

            for (let i = 0; i < key.length; i++) {
                for (let j = 0; j < rows; j++) {
                    result += paddedMessage[j * key.length + key.indexOf(i + 1)];
                }
            }
            return result;
        }

        // ---------- Single Transposition Decryption ----------
        function singleDecryption(cipher, key) {
            key = key.split(',').map(Number);
            let cols = key.length;
            let rows = Math.ceil(cipher.length / cols);
            let grid = Array(rows).fill(null).map(() => Array(cols).fill(''));

            let index = 0;
            for (let i = 0; i < cols; i++) {
                let colIndex = key.indexOf(i + 1);
                for (let j = 0; j < rows; j++) {
                    grid[j][colIndex] = cipher[index++];
                }
            }
            return grid.flat().join('').replace(/X+$/g, '');
        }

        // ---------- Double Transposition Encryption ----------
        function doubleTransposition(message, key1, key2) {
            return singleTransposition(singleTransposition(message, key1), key2);
        }

        // ---------- Double Transposition Decryption ----------
        function doubleDecryption(cipher, key1, key2) {
            return singleDecryption(singleDecryption(cipher, key2), key1);
        }

        // ---------- Button Functions with Timing ----------
        function performSingleTransposition() {
            const message = document.getElementById('inputMessage').value;
            const key = document.getElementById('singleKey').value;
            if (!message || !key) return alert("Enter message and key!");

            const t0 = performance.now();
            const result = singleTransposition(message, key);
            const t1 = performance.now();

            document.getElementById('singleResult').style.display = 'block';
            document.getElementById('singleResult').innerHTML = `<strong>Encrypted:</strong> ${result}`;
            document.getElementById('singleTime').innerText = `⏱ Time Taken: ${(t1 - t0).toFixed(3)} ms`;
        }

        function performSingleDecryption() {
            const message = document.getElementById('inputMessage').value;
            const key = document.getElementById('singleKey').value;
            if (!message || !key) return alert("Enter ciphertext and key!");

            const t0 = performance.now();
            const result = singleDecryption(message, key);
            const t1 = performance.now();

            document.getElementById('singleResult').style.display = 'block';
            document.getElementById('singleResult').innerHTML = `<strong>Decrypted:</strong> ${result}`;
            document.getElementById('singleTime').innerText = `⏱ Time Taken: ${(t1 - t0).toFixed(3)} ms`;
        }

        function performDoubleTransposition() {
            const message = document.getElementById('inputMessageDouble').value;
            const key1 = document.getElementById('doubleKey1').value;
            const key2 = document.getElementById('doubleKey2').value;
            if (!message || !key1 || !key2) return alert("Enter message and both keys!");

            const t0 = performance.now();
            const result = doubleTransposition(message, key1, key2);
            const t1 = performance.now();

            document.getElementById('doubleResult').style.display = 'block';
            document.getElementById('doubleResult').innerHTML = `<strong>Encrypted:</strong> ${result}`;
            document.getElementById('doubleTime').innerText = `⏱ Time Taken: ${(t1 - t0).toFixed(3)} ms`;
        }

        function performDoubleDecryption() {
            const message = document.getElementById('inputMessageDouble').value;
            const key1 = document.getElementById('doubleKey1').value;
            const key2 = document.getElementById('doubleKey2').value;
            if (!message || !key1 || !key2) return alert("Enter ciphertext and both keys!");

            const t0 = performance.now();
            const result = doubleDecryption(message, key1, key2);
            const t1 = performance.now();

            document.getElementById('doubleResult').style.display = 'block';
            document.getElementById('doubleResult').innerHTML = `<strong>Decrypted:</strong> ${result}`;
            document.getElementById('doubleTime').innerText = `⏱ Time Taken: ${(t1 - t0).toFixed(3)} ms`;
        }
    </script>
</body>
</html>
